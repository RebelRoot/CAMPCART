name: CI/CD Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install Dependencies
        working-directory: ./client
        run: npm install
      - name: Build Frontend
        working-directory: ./client
        run: npm run build
        env:
          VITE_BACKEND_URL: "https://api.example.com" # Placeholder for build check

  check-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - name: Install Dependencies
        working-directory: ./api
        run: npm install
      - name: Lint/Check Backend
        working-directory: ./api
        run: node --check server.js

  check-chat-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: chat-service/go.sum
      - name: Install Dependencies
        working-directory: ./chat-service
        run: go mod download
      - name: Build Chat Service
        working-directory: ./chat-service
        run: go build -o main main.go
